name: OTJ MLB Slate Push (11AM ET)

on:
  schedule:
    # ── EARLY RUN (~8 AM ET) — creates the slate ────────────────────────────
    # Moved earlier so the Daily Journal (which chains to this workflow) can
    # preview today's games at a reasonable morning hour. Some starters may
    # still be TBD this early — the late run below fixes those.
    # 8:00 AM ET = 12:00 UTC (EDT) / 13:00 UTC (EST)
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
    # ── LATE RUN (~11 AM ET) — refresh ─────────────────────────────────────
    # Picks up announced probable pitchers (unfreezes TBD analysis) and the
    # latest odds. Still ~2hr before the earliest 1:05 PM ET first pitch.
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to push (YYYY-MM-DD) — leave blank for today'
        required: false
        default: ''
      no_narrative:
        description: 'Skip Claude narratives (faster, cheaper)'
        required: false
        default: 'false'

# Runs write the same (slate_id, matchup) rows — never let two overlap.
concurrency:
  group: otj-mlb-slate-push
  cancel-in-progress: false

jobs:
  push-mlb-slate:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # MLB analyzer makes more API calls than NBA — give it room

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Versions pinned to prevent silent breakage on cron runs.
        # To upgrade a lib: test locally first, then bump the version here.
        run: |
          pip install \
            supabase==2.15.1 \
            python-dotenv==1.1.0 \
            requests==2.32.3 \
            tabulate==0.9.0 \
            pandas==2.2.3 \
            anthropic==0.49.0

      - name: Run MLB slate push
        env:
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          SPORTSGAMEODDS_API_KEY: ${{ secrets.SPORTSGAMEODDS_API_KEY }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd python
          ET_DATE=$(TZ="America/New_York" date +%Y-%m-%d)
          echo "ET date: $ET_DATE"

          # Build the command — add --no-narrative flag if requested
          CMD="python -u push_mlb_to_supabase.py"
          if [ -n "${{ github.event.inputs.date }}" ]; then
            CMD="$CMD --date=${{ github.event.inputs.date }}"
          else
            CMD="$CMD --date=$ET_DATE"
          fi
          if [ "${{ github.event.inputs.no_narrative }}" = "true" ]; then
            CMD="$CMD --no-narrative"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Notify on failure
        if: failure()
        run: echo "❌ MLB slate push failed — check logs above"
