name: OTJ Resolve Picks (6AM ET)

on:
  schedule:
    # 6:00 AM ET = 11:00 UTC (EST) / 10:00 UTC (EDT)
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to grade (YYYY-MM-DD) — leave blank for yesterday'
        required: false
        default: ''

jobs:
  resolve-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'


      - name: Install dependencies
        run: |
          pip install supabase python-dotenv requests

      - name: Run resolve picks
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BALLDONTLIE_API_KEY:  ${{ secrets.BALLDONTLIE_API_KEY }}
          TANK01_API_KEY:       ${{ secrets.TANK01_API_KEY }}
        run: |
          cd python
          ET_DATE=$(TZ="America/New_York" date +%Y-%m-%d)
          YESTERDAY=$(TZ="America/New_York" date -d "yesterday" +%Y-%m-%d)
          echo "ET date: $ET_DATE | Grading: $YESTERDAY"
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -u resolve_picks.py --date=${{ github.event.inputs.date }}
          else
            python -u resolve_picks.py --date=$YESTERDAY
          fi

      - name: Notify on failure
        if: failure()
        run: echo "❌ Resolve picks failed — check logs above"
