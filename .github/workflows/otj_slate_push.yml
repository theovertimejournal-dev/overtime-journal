name: OTJ Slate Push (7AM ET)

on:
  schedule:
    # 7:00 AM ET = 12:00 UTC (EST) / 11:00 UTC (EDT)
    - cron: '0 11 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to push (YYYY-MM-DD) — leave blank for today'
        required: false
        default: ''

jobs:
  push-slate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            supabase==2.15.1 \
            python-dotenv==1.1.0 \
            requests==2.32.3 \
            nba_api==1.5.2 \
            tabulate==0.9.0 \
            lightgbm==4.6.0 \
            xgboost==2.1.4 \
            pandas==2.2.3 \
            scikit-learn==1.6.1 \
            joblib \
            pybaseball \
            anthropic

      - name: Run slate push
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          BALLDONTLIE_API_KEY:       ${{ secrets.BALLDONTLIE_API_KEY }}
          TANK01_API_KEY:            ${{ secrets.TANK01_API_KEY }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          SPORTSGAMEODDS_API_KEY:    ${{ secrets.SPORTSGAMEODDS_API_KEY }}
        run: |
          cd python
          ET_DATE=$(TZ="America/New_York" date +%Y-%m-%d)
          echo "ET date: $ET_DATE"
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -u push_to_supabase.py --date=${{ github.event.inputs.date }}
          else
            python -u push_to_supabase.py --date=$ET_DATE
          fi

      - name: Notify on failure
        if: failure()
        run: echo "❌ Slate push failed — check logs above"
