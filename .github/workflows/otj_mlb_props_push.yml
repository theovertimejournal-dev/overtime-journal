name: OTJ MLB Props Push (2PM ET)

on:
  schedule:
    # 2:00 PM ET (EST) = 7:00 PM UTC
    - cron: '0 19 * * *'
    # 2:00 PM ET (EDT) = 6:00 PM UTC
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date (YYYY-MM-DD) — leave blank for today'
        required: false
        default: ''
      no_narrative:
        description: 'Skip Claude narratives (faster/cheaper)'
        required: false
        default: 'false'
      dry_run:
        description: 'Score + print only — no DB writes'
        required: false
        default: 'false'

jobs:
  push-mlb-props:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # MLB Stats API makes many calls — give it room

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Versions pinned to prevent silent breakage on cron runs.
        run: |
          pip install \
            supabase==2.15.1 \
            python-dotenv==1.1.0 \
            requests==2.32.3 \
            pandas==2.2.3 \
            anthropic==0.49.0

      - name: Run MLB props push
        env:
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          SPORTSGAMEODDS_API_KEY: ${{ secrets.SPORTSGAMEODDS_API_KEY }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd python
          ET_DATE=$(TZ="America/New_York" date +%Y-%m-%d)
          echo "ET date: $ET_DATE"

          CMD="python -u push_mlb_props_to_supabase.py"

          if [ -n "${{ github.event.inputs.date }}" ]; then
            CMD="$CMD --date=${{ github.event.inputs.date }}"
          else
            CMD="$CMD --date=$ET_DATE"
          fi

          if [ "${{ github.event.inputs.no_narrative }}" = "true" ]; then
            CMD="$CMD --no-narrative"
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            CMD="$CMD --dry-run"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Notify on failure
        if: failure()
        run: echo "❌ MLB props push failed — check logs above"
