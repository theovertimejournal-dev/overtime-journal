name: Build MLB Features

on:
  workflow_dispatch:
    inputs:
      backfill_run_id:
        description: "Backfill MLB History run ID"
        required: true
        type: string
      pitcher_run_id:
        description: "Pull MLB Pitchers run ID"
        required: true
        type: string
      bullpen_run_id:
        description: "Pull MLB Bullpen run ID"
        required: true
        type: string
      lineup_run_id:
        description: "Pull MLB Lineups run ID (with batter_ids)"
        required: true
        type: string
      arsenal_run_id:
        description: "Pull Pitcher Arsenal run ID"
        required: true
        type: string
      hitter_splits_run_id:
        description: "Pull Hitter Pitch Splits run ID"
        required: true
        type: string
      umpire_run_id:
        description: "Pull MLB Umpires run ID"
        required: true
        type: string
      weather_run_id:
        description: "Pull MLB Weather run ID"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pandas pyarrow numpy

      - name: Download backfill
        uses: actions/download-artifact@v4
        with:
          name: mlb-historical-data
          path: data/
          run-id: ${{ inputs.backfill_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download pitchers
        uses: actions/download-artifact@v4
        with:
          name: mlb-pitcher-data
          path: data/
          run-id: ${{ inputs.pitcher_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download bullpen
        uses: actions/download-artifact@v4
        with:
          name: mlb-bullpen-data
          path: data/
          run-id: ${{ inputs.bullpen_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download lineups
        uses: actions/download-artifact@v4
        with:
          name: mlb-lineup-data
          path: data/
          run-id: ${{ inputs.lineup_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download arsenal
        uses: actions/download-artifact@v4
        with:
          name: mlb-arsenal-data
          path: data/
          run-id: ${{ inputs.arsenal_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download hitter splits
        uses: actions/download-artifact@v4
        with:
          name: mlb-hitter-splits-data
          path: data/
          run-id: ${{ inputs.hitter_splits_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download umpires
        uses: actions/download-artifact@v4
        with:
          name: mlb-umpire-data
          path: data/
          run-id: ${{ inputs.umpire_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download weather
        uses: actions/download-artifact@v4
        with:
          name: mlb-weather-data
          path: data/
          run-id: ${{ inputs.weather_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List downloads
        run: ls -la data/

      - name: Build features
        run: python python/build_features.py

      - name: Upload training data
        uses: actions/upload-artifact@v4
        with:
          name: mlb-training-data
          path: |
            data/mlb_training_*.parquet
            data/preview_features_*.csv
          retention-days: 14
