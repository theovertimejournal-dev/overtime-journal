name: OTJ Auto-Blog (Morning)

# Runs after morning resolve to generate a daily blog post
# Draft goes to Discord for approval, or auto-publishes if configured

on:
  schedule:
    # 10:45 AM ET = 15:45 UTC (EST) / 14:45 UTC (EDT)
    # 15 min after morning resolve finishes
    - cron: '45 14 * * *'
    - cron: '45 15 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to blog about (YYYY-MM-DD) — leave blank for yesterday'
        required: false
        default: ''
      type:
        description: 'Blog type: recap, lesson, signal, update'
        required: false
        default: 'recap'
      publish:
        description: 'Auto-publish without Discord approval?'
        required: false
        default: 'false'

jobs:
  auto-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install supabase python-dotenv requests anthropic

      - name: Generate blog
        env:
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_BLOG_WEBHOOK:   ${{ secrets.DISCORD_BLOG_WEBHOOK }}
        run: |
          cd python
          
          # Determine date
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE="${{ github.event.inputs.date }}"
          else
            DATE=$(TZ="America/New_York" date -d "yesterday" +%Y-%m-%d 2>/dev/null || TZ="America/New_York" date -v-1d +%Y-%m-%d)
          fi
          
          # Determine type
          TYPE="${{ github.event.inputs.type }}"
          TYPE=${TYPE:-recap}
          
          # Determine publish mode
          PUBLISH="${{ github.event.inputs.publish }}"
          PUBLISH_FLAG=""
          if [ "$PUBLISH" = "true" ]; then
            PUBLISH_FLAG="--publish"
          fi
          
          echo "Date: $DATE | Type: $TYPE | Auto-publish: $PUBLISH"
          python -u auto_blog.py --date=$DATE --type=$TYPE $PUBLISH_FLAG

      - name: Notify on failure
        if: failure()
        run: echo "❌ Auto-blog failed — check logs above"
