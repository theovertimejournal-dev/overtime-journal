name: Pull MLB Weather

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Year (blank = both)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "2024"
          - "2025"
      backfill_run_id:
        description: "Backfill MLB History run ID"
        required: true
        type: string

jobs:
  weather:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests pandas pyarrow

      - name: Download backfill
        uses: actions/download-artifact@v4
        with:
          name: mlb-historical-data
          path: data/
          run-id: ${{ inputs.backfill_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run weather pull
        run: |
          ARGS=""
          if [ -n "${{ inputs.year }}" ]; then
            ARGS="--year ${{ inputs.year }}"
          fi
          python python/pull_mlb_weather.py $ARGS

      - name: Upload weather data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-weather-data
          path: |
            data/weather_features_*.parquet
            data/preview_weather_*.csv
          retention-days: 14
