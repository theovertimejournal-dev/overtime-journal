name: OTJ Daily Journal (Multi-Voice)

# Chained to the MLB slate push so the journal always has:
#   1. Last night's resolved results (recap)
#   2. TODAY's slate for the "What's Next" preview
#
# Why chained, not cron: the journal used to run 7:15 AM ET while the MLB push
# runs 11:00 AM ET — so "What's Next" read a slate that didn't exist yet and came
# back empty every day. workflow_run guarantees the slate is written first.

on:
  workflow_run:
    workflows: ["OTJ MLB Slate Push (11AM ET)"]
    types: [completed]

  workflow_dispatch:
    inputs:
      date:
        description: 'Date to blog about (YYYY-MM-DD) — leave blank for yesterday'
        required: false
        default: ''
      publish:
        description: 'Auto-publish without Discord approval?'
        required: false
        default: 'false'

# The push has two crons (DST coverage), so it fires twice a day and would
# trigger two journals. Serialize them; the later one upserts over the same
# (date, sport) row rather than racing it.
concurrency:
  group: otj-daily-journal
  cancel-in-progress: false

jobs:
  daily-journal:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    # On the chained trigger, only run if the slate push actually succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install supabase python-dotenv requests anthropic

      - name: Scrape voice library
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd python
          DATE=$(TZ="America/New_York" date -d "yesterday" +%Y-%m-%d 2>/dev/null || TZ="America/New_York" date -v-1d +%Y-%m-%d)
          echo "Scraping voice data for: $DATE"
          python -u scrape_voice_library.py --date=$DATE || echo "Voice scrape failed (non-fatal)"

      - name: Scrape Reddit sentiment
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd python
          DATE=$(TZ="America/New_York" date -d "yesterday" +%Y-%m-%d 2>/dev/null || TZ="America/New_York" date -v-1d +%Y-%m-%d)
          python -u scrape_sentiment.py --date=$DATE || echo "Sentiment scrape failed (non-fatal)"

      - name: Generate multi-voice blog
        env:
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_BLOG_WEBHOOK:   ${{ secrets.DISCORD_BLOG_WEBHOOK }}
        run: |
          cd python

          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE="${{ github.event.inputs.date }}"
          else
            DATE=$(TZ="America/New_York" date -d "yesterday" +%Y-%m-%d 2>/dev/null || TZ="America/New_York" date -v-1d +%Y-%m-%d)
          fi

          PUBLISH_FLAG=""
          if [ "${{ github.event.inputs.publish }}" = "true" ]; then
            PUBLISH_FLAG="--publish"
          fi

          echo "Generating blog for: $DATE"
          python -u multi_voice_blog.py --date=$DATE $PUBLISH_FLAG

      - name: Notify on failure
        if: failure()
        run: echo "❌ Daily journal generation failed"
