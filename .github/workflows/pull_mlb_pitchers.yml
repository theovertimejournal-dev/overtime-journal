name: Pull MLB Pitchers

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Year to process (blank = both 2024 & 2025)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "2024"
          - "2025"
      backfill_run_id:
        description: "Run ID of the Backfill MLB History workflow that produced the parquets (find in Actions tab URL)"
        required: true
        type: string

jobs:
  pull-pitchers:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests pandas pyarrow

      - name: Download historical parquets from previous backfill run
        uses: actions/download-artifact@v4
        with:
          name: mlb-historical-data
          path: data/
          run-id: ${{ inputs.backfill_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run pitcher pull
        run: |
          ARGS=""
          if [ -n "${{ inputs.year }}" ]; then
            ARGS="--year ${{ inputs.year }}"
          fi
          python python/pull_mlb_pitchers.py $ARGS

      - name: Upload pitcher parquets + previews
        uses: actions/upload-artifact@v4
        with:
          name: mlb-pitcher-data
          path: |
            data/pitcher_features_*.parquet
            data/preview_pitchers_*.csv
          retention-days: 14
