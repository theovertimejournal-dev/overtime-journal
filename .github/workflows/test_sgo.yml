name: Test SGO API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Test SGO endpoints
        env:
          SPORTSGAMEODDS_API_KEY: ${{ secrets.SPORTSGAMEODDS_API_KEY }}
        run: |
          python - <<'EOF'
          import requests, json, os

          KEY = os.environ.get("SPORTSGAMEODDS_API_KEY")
          BASE = "https://api.sportsgameodds.com/v2"
          H = {"X-Api-Key": KEY}

          def sgo(endpoint, params):
              r = requests.get(f"{BASE}{endpoint}", headers=H, params=params, timeout=20)
              return r.json()

          for name, endpoint, params in [
              ("NBA Events", "/events", {"leagueID": "NBA"}),
              ("NBA Odds",   "/odds",   {"leagueID": "NBA"}),
              ("NBA Props",  "/props",  {"leagueID": "NBA"}),
              ("MLB Events", "/events", {"leagueID": "MLB"}),
              ("MLB Odds",   "/odds",   {"leagueID": "MLB"}),
          ]:
              print(f"\n{'='*60}")
              print(f"  {name}")
              print(f"{'='*60}")
              data = sgo(endpoint, params)
              # Print first item only
              for key in ["events","odds","props","data"]:
                  if data.get(key) and len(data[key]) > 0:
                      print(f"  Top-level keys: {list(data.keys())}")
                      print(f"  First item keys: {list(data[key][0].keys())}")
                      print(f"  First item:\n{json.dumps(data[key][0], indent=2)[:1000]}")
                      break
              else:
                  print(f"  Response: {json.dumps(data, indent=2)[:500]}")
          EOF
