name: OTJ Live Scores Ticker (9:30PM ET)

on:
  schedule:
    # 9:30 PM ET = 02:30 UTC next day (EST) / 01:30 UTC (EDT)
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to fetch scores for (YYYY-MM-DD) — leave blank for today'
        required: false
        default: ''

jobs:
  update-ticker:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install supabase python-dotenv requests

      - name: Run live scores update
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TANK01_API_KEY:       ${{ secrets.TANK01_API_KEY }}
        run: |
          cd python
          echo "--- Running live_scores.py ---"
          # Use ET date (UTC-5) not UTC date
          ET_DATE=$(TZ="America/New_York" date +%Y-%m-%d)
          echo "ET date: $ET_DATE"
          python -u live_scores.py --date=$ET_DATE
          echo "--- Done ---"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Live scores update failed — check logs above"
