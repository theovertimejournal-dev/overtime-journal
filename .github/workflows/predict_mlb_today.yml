name: Predict MLB Today

on:
  # Auto-run right after the slate push finishes.
  # predict UPDATES the rows the push INSERTs, so it MUST run after the push,
  # on the SAME date — chaining guarantees both and kills the race condition.
  workflow_run:
    workflows: ["OTJ MLB Slate Push (11AM ET)"]
    types: [completed]

  # Manual override still available. run-id inputs are gone — artifacts are
  # always resolved to the latest successful run, so there is nothing to type.
  workflow_dispatch:
    inputs:
      game_date:
        description: "Game date (YYYY-MM-DD, blank = today ET)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (no DB writes)"
        required: false
        default: "false"

# Two push crons (15:00 + 16:00 UTC for DST) will each trigger a predict.
# Serialize them so they don't write the same rows concurrently.
concurrency:
  group: predict-mlb-today
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # On the chained trigger, only run if the push actually succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install pandas pyarrow numpy scikit-learn lightgbm xgboost catboost requests supabase python-dotenv

      # ---- Artifacts: always grab the LATEST successful run, no run IDs ----
      # NOTE: confirm these three workflow filenames match your repo exactly.
      - name: Download trained models
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: train_mlb_ensemble.yml          # <-- CONFIRM filename
          workflow_conclusion: success
          name: mlb-trained-models
          path: models/

      - name: Download arsenal cache
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: pull_pitcher_arsenal.yml        # <-- CONFIRM filename
          workflow_conclusion: success
          name: mlb-arsenal-data
          path: data/

      - name: Download hitter splits cache
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: pull_hitter_pitch_splits.yml    # <-- CONFIRM filename
          workflow_conclusion: success
          name: mlb-hitter-splits-data
          path: data/

      - name: List models + data
        run: ls -la models/ && ls -la data/ || true

      - name: Run predictions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SPORTSGAMEODDS_API_KEY: ${{ secrets.SPORTSGAMEODDS_API_KEY }}
        run: |
          # Mirror the push's ET date so predict updates the SAME rows the push
          # inserted. Without this, predict would default to the runner's UTC
          # "today" and miss rows near the date boundary.
          ET_DATE=$(TZ="America/New_York" date +%Y-%m-%d)
          GAME_DATE="${{ github.event.inputs.game_date }}"
          DATE_ARG="--date=${GAME_DATE:-$ET_DATE}"

          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY="--dry-run"
          fi

          echo "Running: python python/predict_mlb_today.py $DATE_ARG $DRY"
          python python/predict_mlb_today.py $DATE_ARG $DRY

      - name: Notify on failure
        if: failure()
        run: echo "❌ MLB predict failed — check logs above"
