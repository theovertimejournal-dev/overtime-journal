name: Pull Hitter Pitch Splits

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Year (blank = both)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "2024"
          - "2025"
      pitcher_run_id:
        description: "Pull MLB Pitchers run ID (used to find game pks)"
        required: true
        type: string

jobs:
  splits:
    runs-on: ubuntu-latest
    timeout-minutes: 240   # 4 hours - this one is slow

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pandas pyarrow pybaseball requests

      - name: Download pitchers
        uses: actions/download-artifact@v4
        with:
          name: mlb-pitcher-data
          path: data/
          run-id: ${{ inputs.pitcher_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run hitter splits pull
        run: |
          ARGS=""
          if [ -n "${{ inputs.year }}" ]; then
            ARGS="--year ${{ inputs.year }}"
          fi
          python python/pull_hitter_pitch_splits.py $ARGS

      - name: Upload hitter splits
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-hitter-splits-data
          path: |
            data/hitter_pitch_splits_*.parquet
            data/preview_hitter_splits_*.csv
          retention-days: 14
